services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1053870909"
      MYSQL_DATABASE: smart_buses_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - buses-network

  ms-notification:
    build:
      context: ./ms-notification
    container_name: ms-notification
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./ms-notification/.env # Carga las variables locales (Telegram/Email config)
    networks:
      - buses-network

  ms-security:
    build:
      context: ./ms-security
    container_name: ms-security
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Sobrescribimos la URL de notificaciones para usar el contenedor interno
      - notifications.url=http://ms-notification:5000
    depends_on:
      - ms-notification
    networks:
      - buses-network

  ms-logic:
    build:
      context: ./ms-logic
    container_name: ms-logic
    restart: always
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=1053870909
      - DB_NAME=smart_buses_db
      - MS_SECURITY=http://ms-security:8081
    depends_on:
      - mysql-db
      - ms-security
    networks:
      - buses-network

  buses_frontend:
    build:
      context: ./buses_frontend
    container_name: buses_frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - buses-network

networks:
  buses-network:
    driver: bridge

volumes:
  mysql_data:
